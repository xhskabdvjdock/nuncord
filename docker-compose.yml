version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: discord-clone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: discord
      POSTGRES_PASSWORD: discord123
      POSTGRES_DB: discord_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
